{% extends 'workouts/base.html' %}

{% block content %}
<div class="card">
    <h1>Welcome Back!</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Log In</button>
    </form>

    <br>
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock %}
