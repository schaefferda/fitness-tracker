<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log a Workout</title>
</head>
<body>
    <h1>Log a New Workout Session</h1>

    <form method="POST">
        {% csrf_token %}

        <h3>Workout Details</h3>
        {{ form.as_p }}

        <hr>

        <h3>Exercises & Sets</h3>
        {{ formset.management_form }}

        <div id="formset-container">
            {% for set_form in formset %}
                <div class="set-form" style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
                    {{ set_form.as_p }}
                </div>
            {% endfor %}
        </div>

        <button type="button" id="add-set-btn">+ Add another set</button>

        <br><br>
        <button type="submit">Save Session</button>
    </form>

    <br>
    <a href="{% url 'workout_list' %}">Cancel and go back</a>

    <script>
        // 1. Grab the button, the container, and the hidden total-forms input
        const addBtn = document.getElementById('add-set-btn');
        const container = document.getElementById('formset-container');

        // Django names this hidden input based on the child model.
        // By default, it is 'childmodel_set-TOTAL_FORMS'.
        const totalFormsInput = document.getElementById('id_workoutset_set-TOTAL_FORMS');

        addBtn.addEventListener('click', function(e) {
            e.preventDefault(); // Prevent any default button behavior

            // 2. Find all current forms on the page
            const currentForms = document.querySelectorAll('.set-form');
            const formCount = currentForms.length; // How many forms are currently there?

            // 3. Clone the very last form in the list
            const lastForm = currentForms[formCount - 1];
            const newForm = lastForm.cloneNode(true); // true means copy all the HTML inside it too

            // 4. Update the IDs and Names in the cloned form
            // Django expects the first form to be index 0, the second to be 1, etc.
            // We use a regular expression to replace the old index with the new index.
            const formRegex = new RegExp(`workoutset_set-(\\d+)-`, 'g');
            newForm.innerHTML = newForm.innerHTML.replace(formRegex, `workoutset_set-${formCount}-`);

            // 5. Clear out any data the user might have already typed into the cloned form
            const inputs = newForm.querySelectorAll('input, select');
            inputs.forEach(input => {
                if (input.type !== 'hidden' && input.type !== 'checkbox') {
                    input.value = ''; // Wipe text/number inputs
                }
            });

            // 6. Add the fresh form to the page
            container.appendChild(newForm);

            // 7. Tell Django's management form that we added a new form!
            totalFormsInput.value = formCount + 1;
        });
    </script>
</body>
</html>
