{% extends 'workouts/base.html' %}

{% block content %}
<div class="card">
    <h1>Create an Account</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Sign Up</button>
    </form>

    <br>
    <p>Already have an account? <a href="{% url 'login' %}">Log in here.</a></p>
</div>
{% endblock %}
