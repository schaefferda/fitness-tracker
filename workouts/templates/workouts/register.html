<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register for Fitness Tracker</title>
</head>
<body>
    <h1>Create an Account</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Sign Up</button>
    </form>

    <br>
    <p>Already have an account? <a href="{% url 'login' %}">Log in here.</a></p>

</body>
</html>
